<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海老フライ王国AR</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#fff8f0;
    margin:0;
    padding:20px;
}

h1{
    color:#d35400;
}

.card{
    background:white;
    margin:15px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    width:220px;
    padding:15px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🦐 海老フライ王国AR</h1>
<img src="images/ebimaru.png"
     width="200"
     alt="エビ丸">
<h2 id="point-display">
現在ポイント：0
</h2>
<h2 id="level-display">
レベル：1
</h2>
<div class="card">
<h2>エビ丸の冒険</h2>

<p>レベル 1</p>
<p>仲間の海老 0匹</p>

<button>探検に出発</button><br>
<a href="zukan.html">
<button>海老図鑑</button>
</a>
<a href="map.html">
<button>冒険マップ</button>
</a>
<a href="coupon.html">
<button>クーポン</button>
</a>
<br>

<a href="gps.html">
<button>📍GPSテスト</button>
</a>
</div>
<script>

let point =
Number(localStorage.getItem("point")) || 0;

document.getElementById("point-display")
.innerHTML =
"現在ポイント：" + point;
let level = 1;

if(point >= 100){
    level = 2;
}

if(point >= 300){
    level = 3;
}

if(point >= 600){
    level = 4;
}

if(point >= 1000){
    level = 5;
}

document.getElementById("level-display")
.innerHTML =
"レベル：" + level;
</script>
</body>
</html>
