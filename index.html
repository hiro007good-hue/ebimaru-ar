<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海老フライ王国AR</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#fff8f0;
    margin:0;
    padding:20px;
}

h1{
    color:#d35400;
}

.card{
    background:white;
    margin:15px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    width:220px;
    padding:15px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#ebimaru{

animation:dance 1s infinite;

position:relative;

}

@keyframes dance{

0%{
transform:rotate(-10deg);
}

25%{
transform:rotate(10deg);
}

50%{
transform:translateY(-10px);
}

75%{
transform:rotate(10deg);
}

100%{
transform:rotate(-10deg);
}

}

#speech{

width:300px;

margin:20px auto;

padding:15px;

background:white;

border-radius:20px;

box-shadow:0 0 10px #ccc;

font-size:20px;

font-weight:bold;

}
</style>
</head>

<body>

<h1>🦐 海老フライ王国AR</h1>

<h3 id="zukan-rate">
図鑑完成率：0 / 20
</h3>

<img
id="ebimaru"
src="images/ebimaru.png"
width="200"
alt="エビ丸"
onclick="talkEbi()">
<div id="speech">

海老フライ王国へようこそ！

</div>
<div id="next-level"></div>
<h2 id="point-display">
現在ポイント：0
</h2>
<h2 id="level-display">
レベル：1
</h2>
<div class="card">
<h2>エビ丸の冒険</h2>

<p>レベル 1</p>
<p>仲間の海老 0匹</p>

<button>探検に出発</button><br>
<a href="zukan.html">
<button>海老図鑑</button>
</a>
<a href="map.html">
<button>冒険マップ</button>
</a>
<a href="coupon.html">
<button>クーポン</button>
</a>
<br>

<a href="gps.html">
<button>📍GPSテスト</button>
</a>
<a href="busho.html">
<button>⚔️ 武将えび探索</button>
</a>
    
</div>


<script>

let point =
Number(localStorage.getItem("point")) || 0;

document.getElementById("point-display")
.innerHTML =
"現在ポイント：" + point;
let levelName = "海老見習い";

if(point >= 100){
    levelName = "海老隊員";
}

if(point >= 300){
    levelName = "海老隊長";
}

if(point >= 600){
    levelName = "海老将軍";
}

if(point >= 1000){
    levelName = "海老王";
}

if(point >= 2000){
    levelName = "海老皇帝";
}

if(point >= 5000){
    levelName = "海老神";
}

let levelIcon = "🦐";

if(point >= 300){
    levelIcon = "⚔️";
}

if(point >= 1000){
    levelIcon = "👑";
}

if(point >= 2000){
    levelIcon = "🏆";
}

if(point >= 5000){
    levelIcon = "✨";
}

document.getElementById("level-display")
.innerHTML =
levelIcon + " 称号：" + levelName;

let found = 0;

// エビ丸
if(localStorage.getItem("ebimaru") === "captured"){
    found++;
}

// 黄金えび
if(localStorage.getItem("goldenEbi") === "captured"){
    found++;
}

// 将来追加予定
/*
if(localStorage.getItem("bushoEbi") === "captured"){
    found++;
}

if(localStorage.getItem("hanaEbi") === "captured"){
    found++;
}
*/

document.getElementById("zukan-rate")
.innerHTML =
"📖 図鑑完成率：" +
found +
" / 20匹";


const messages = [

"海老フライ王国へようこそ！",

"日野町を冒険しよう！",

"黄金えびを探してね！",

"ポイントを集めよう！",

"クーポンGETだ！"

];

let current = 0;

setInterval(function(){

current++;

if(current >= messages.length){

current = 0;

}

document.getElementById("speech").innerHTML =
messages[current];

},3000);

function talkEbi(){

    let chance =
Math.floor(Math.random() * 10);

if(chance === 0){

    let point =
    Number(localStorage.getItem("point")) || 0;

    point += 5;

    localStorage.setItem("point", point);

    document.getElementById("point-display")
.innerHTML =
"現在ポイント：" + point;

    document.getElementById("speech").innerHTML =
    "🎉ラッキー！<br>5ポイント獲得！";

    return;
}

const talks = [

"海老フライ王国へようこそ！",

"今日は黄金えびが出るかも！",

"ポイントを集めよう！",

"日野町を冒険してね！",

"はま田の海老フライは絶品だよ！",

"図鑑コンプリートを目指そう！",

"武将えびを探してみて！"

];

let r =
Math.floor(Math.random() * talks.length);

document.getElementById("speech").innerHTML =
talks[r];

}
</script>
</body>
</html>
