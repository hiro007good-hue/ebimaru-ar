<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPSテスト</title>

<style>

body{
    font-family:sans-serif;
    text-align:center;
    background:#fff8f0;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:500px;
    margin:auto;
    box-shadow:0 0 10px #ccc;
}

button{
    padding:15px 30px;
    font-size:18px;
}

<br><br>

<button onclick="resetGoldenEbi()">
テストリセット
</button>

</style>

</head>
<body>

<h1>📍 GPSテスト</h1>

<div class="card">

<p id="status">
位置情報を取得してください
</p>

<div id="golden-area"></div>

<button onclick="getLocation()">
現在地を取得
</button>

</div>

<script>


function getLocation(){

    navigator.geolocation.getCurrentPosition(

        function(position){

            let lat = position.coords.latitude;
            let lng = position.coords.longitude;

            document.getElementById("status").innerHTML =
            "緯度：" + lat +
            "<br>経度：" + lng;

            checkGoldenEbi(lat,lng);

        },

        function(){

            document.getElementById("status").innerHTML =
            "位置情報を取得できません";

        }

    );

}

function checkGoldenEbi(lat,lng){

    if(localStorage.getItem("goldenEbi") === "captured"){
    return;
}

    const shopLat = 35.00582;
    const shopLng = 136.28101;

    let distance =
    Math.sqrt(
        Math.pow(lat - shopLat,2) +
        Math.pow(lng - shopLng,2)
    );

    if(distance < 0.001){

        document.getElementById("status").innerHTML +=
        "<br><br>✨ 黄金えび発見！";

        document.getElementById("golden-area").innerHTML =
        '<button onclick="captureGoldenEbi()">黄金えびを捕獲</button>';

    }

}

function captureGoldenEbi(){

    localStorage.setItem(
        "goldenEbi",
        "captured"
    );

    let point =
    Number(localStorage.getItem("point")) || 0;

    point += 1000;

    localStorage.setItem(
        "point",
        point
    );

    alert(
        "黄金えびGET！\n1000ポイント獲得！"
    );

     document.getElementById("golden-area").innerHTML =
    "✅ 黄金えび 捕獲済み";

}



if(localStorage.getItem("goldenEbi") === "captured"){

    document.getElementById("golden-area").innerHTML =
    "✅ 黄金えび 捕獲済み";

}

function resetGoldenEbi(){

    localStorage.removeItem("goldenEbi");

    alert("黄金えびをリセットしました");

    location.reload();

}

</script>

</body>
</html>
